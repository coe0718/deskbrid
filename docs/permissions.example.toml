    "layout_profiles.restore",

    # --- Input ---
    "input.keyboard",        # ★ keyboard typing, key, combos
    "input.mouse",           # ★ mouse move, click, scroll
    "input.mouse.drag",      # ★ click-and-drag
    "input.layouts.list",
    "input.layout.get",
    "input.layout.set",
    "input.layout.add",
    "input.layout.remove",

    # --- Clipboard ---
