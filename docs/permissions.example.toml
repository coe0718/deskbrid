# Deskbrid Permissions — Example Configuration
# 
# Place at: ~/.config/deskbrid/permissions.toml
#
# This file controls which actions each peer (identified by Unix UID) can execute.
# The daemon reads this on startup — changes require a restart.
#
# ============================================================
# How permissions work
# ============================================================
#
# 1. [default] section — applied to any peer not explicitly listed.
# 2. [peer.<uid>] — per-UID overrides (use output of `id -u`).
# 3. DENY list is checked FIRST — explicit denies always win.
# 4. ALLOW list grants access if a pattern matches.
# 5. HIGH-RISK actions require EXACT naming — wildcards don't work.
#    E.g. "screenshot.*" won't unlock screenshot. You must write "screenshot".
# 6. Everything else defaults to DENY.
#
# ============================================================
# Wildcards
# ============================================================
#
#   "*"         = every action (safe + high-risk alike — BE CAREFUL)
#   "windows.*" = everything under windows (windows.list, windows.focus, …)
#   "*.list"    = every "list" action across all categories
#   "input.*"   = input.keyboard, input.mouse, input.mouse.drag, input.layouts.*, input.layout.*
#   "clipboard.history" = exact match (no wildcard needed)
#
# ============================================================
# Quick-Start Presets
# ============================================================
#
# === Read-Only Agent (safe for untrusted callers) ===
# [default]
# allow = [
#     "ping",
#     "system.info",
#     "system.capabilities",
#     "system.health",
#     "windows.list",
#     "workspaces.list",
#     "monitor.list",
#     "audio.list_sinks",
#     "audio.list_sources",
#     "audio.get_volume",
#     "clipboard.read",
# ]
#
# === Full Desktop Control (trusted agent — YOU) ===
# [default]
# allow = [
#     "*",
#     "browser.evaluate",
#     "process.start",
#     "process.stop",
#     "process.signal",
#     "terminal.create",
#     "system.update",
#     "system.power",
#     "dbus.call",
#     "files.write",
#     "files.delete",
#     "files.move",
#     "clipboard.read",
#     "clipboard.history",
#     "screenshot",
#     "screenshot.ocr",
#     "screenshot.diff",
#     "input.keyboard",
#     "input.mouse",
#     "input.mouse.drag",
#     "secrets.get_secret",
#     "secrets.store_secret",
# ]
# deny = []

# ============================================================
# Complete Action Reference
# ============================================================
# ★ = high-risk (requires exact name, wildcards skipped)
# All others support wildcard patterns.

[default]
allow = [
    # --- Meta ---
    "ping",

    # --- Windows & Workspaces ---
    "windows.list",
    "windows.focus",        # ★ input.keyboard covers this
    "windows.get",
    "windows.close",         # ★
