    "system.backlight_set",
    "system.print_list",
    "system.print_default",
    "system.print_file",
    "system.print_jobs",
    "system.print_job_cancel",
    "system.print_job_pause",
    "system.print_job_resume",
    "system.pressure",
    "system.thermal",
    "system.cpu.frequency",
    "system.cpu.governor",
    "system.cpu.set_governor",
    "system.inhibit",
