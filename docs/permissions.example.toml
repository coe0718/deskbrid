deny = []

# --- Per-UID overrides ---
# Example: UID 1001 gets read-only access
# [peer.1001]
# allow = ["windows.list", "system.info", "system.health"]
# deny = ["*"]

# Example: UID 1002 has everything except destructive system control
# [peer.1002]
# allow = ["*"]
# deny = ["system.power", "system.update", "process.start", "terminal.create"]
