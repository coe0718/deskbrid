name: Deploy Site

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to NUC7
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "site/*"
          target: "/home/coemedia2/deskbrid-site"
          strip_components: 1
          overwrite: true

      - name: Move to Caddy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sudo -n mv /home/coemedia2/deskbrid-site/index.html /home/coemedia2/docker/apps/caddy/sites-enabled/sites/html/deskbrid/index.html
            sudo -n mv /home/coemedia2/deskbrid-site/install.sh /home/coemedia2/docker/apps/caddy/sites-enabled/sites/html/deskbrid/install.sh
            rm -rf /home/coemedia2/deskbrid-site
