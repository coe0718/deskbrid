name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install cross compiler (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -yqq gcc-aarch64-linux-gnu

      - name: Build (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Package tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "deskbrid-${{ matrix.target }}.tar.gz" deskbrid cosmic-helper labwc-helper

      - name: Generate SHA256 checksums
        run: |
          cd target/${{ matrix.target }}/release
          for f in deskbrid-*.tar.gz; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Extract release notes from CHANGELOG
        run: |
          awk '/^## v/{if(found) exit; found=1} found' CHANGELOG.md > /tmp/release-notes.md
          head -c 8000 /tmp/release-notes.md > /tmp/release-notes-trunc.md

      - name: Upload tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/deskbrid-*
          body_path: /tmp/release-notes-trunc.md

  docker:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/coe0718/deskbrid
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
