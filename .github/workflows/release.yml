name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross_pkg: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross_pkg: gcc-aarch64-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install cross-compiler + OpenSSL (ARM)
        if: matrix.cross_pkg != ''
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update -qq
          sudo apt-get install -yqq ${{ matrix.cross_pkg }} libssl-dev:arm64

      - name: Install OpenSSL (x86_64)
        if: matrix.cross_pkg == ''
        run: sudo apt-get update -qq && sudo apt-get install -yqq libssl-dev

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "deskbrid-${{ matrix.target }}.tar.gz" deskbrid

      - name: Upload tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/deskbrid-*.tar.gz
          generate_release_notes: true
