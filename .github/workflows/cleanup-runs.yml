name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: '0 4 * * 0'  # Every Sunday at 4am UTC
  workflow_dispatch:
    inputs:
      retain_days:
        description: 'Days to retain'
        required: false
        default: '7'
        type: string
      dry_run:
        description: 'Dry run (no actual deletion)'
        required: false
        default: false
        type: boolean

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2.1.0
        with:
          retain_days: ${{ github.event.inputs.retain_days || 7 }}
          keep_minimum_runs: 3
          dry_run: ${{ github.event.inputs.dry_run || false }}
